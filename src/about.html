<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AG | About Us</title>
    <link rel="stylesheet" href="css/styles_1.css">
    <link rel="icon"
        href="https://raw.githubusercontent.com/AG-Pixel-creater/Images/refs/heads/main/Screenshot_2025-04-03_063111-removebg-preview.png"
        type="logo.png">
</head>

<body data-theme="dark">
    <!-- Add Loader -->
    <div class="loader-container">
        <div class="logo-loader">
            <img src="https://raw.githubusercontent.com/AG-Pixel-creater/Images/refs/heads/main/Screenshot_2025-04-03_063111-removebg-preview.png"
                alt="Logo">
            <div class="smoke-ring"></div>
            <div class="smoke-ring" style="animation-delay: 0.5s"></div>
            <div class="smoke-ring" style="animation-delay: 1s"></div>
        </div>
    </div>

    <div class="background-content">
        <header>
            <div>
                <h1 data-i18n="head.about">AG | About Us</h1>
            </div>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <div class="header-controls" align="right">
                <button id="settingsBtn" class="settings-btn" title="Settings">
                    <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true">
                        <!-- simplified gear icon path to replace malformed d attribute -->
                        <path fill="currentColor"
                            d="M11.983 2.641a1 1 0 00-1.966 0l-.07.265a8.042 8.042 0 00-1.383.4l-.201-.201a1 1 0 10-1.414 1.414l.2.2a8.088 8.088 0 00-.399 1.38l-.265.07a1 1 0 000 1.966l.265.07c.099.456.248.9.439 1.314l-.2.2a1 1 0 101.414 1.414l.2-.2c.415.191.859.34 1.314.439l.07.265a1 1 0 001.966 0l.07-.265c.455-.099.9-.248 1.314-.439l.2.2a1 1 0 001.414-1.414l-.2-.2c.191-.415.34-.859.439-1.314l.265-.07a1 1 0 000-1.966l-.265-.07a8.042 8.042 0 00-.4-1.383l.201-.201a1 1 0 10-1.414-1.414l-.2.2a8.088 8.088 0 00-1.38-.399l-.07-.265zM10 13a3 3 0 110-6 3 3 0 010 6z" />
                    </svg>
                </button>
                <div class="user-info-wrapper">
                    <div class="user-id-label" data-i18n="msg.userId">User ID</div>
                    <div id="userDisplay" class="user-display"></div>
                    <button id="logoutBtn" class="logout-btn" data-i18n="btn.logout">Logout</button>
                </div>
            </div>
        </header>
        <nav>
            <ul>
                <li><a href="home.html" data-i18n="nav.home">Home</a></li>
                <li class="active"><a href="about.html" data-i18n="nav.about">About Us</a></li>
                <li><a href="products.html" data-i18n="nav.products">Products</a></li>
                <li><a href="privacy.html" data-i18n="nav.privacy">Privacy</a></li>
                <li><a href="contact.html" data-i18n="nav.contact">Contact Us</a></li>
            </ul>
        </nav>
        <div class="container">
            <h2 data-i18n="body.heading.about">About AG Electronics Pvt. Ltd.</h2>
            <p data-i18n="body.description.about">here information was goind to add after company was registered</p>
        </div>
        <!-- Shared Settings Modal -->
        <div id="settingsModal" class="modal hidden">
            <div class="modal-content">
                <form class="settings-form">
                    <div class="settings-section">
                        <h3 data-i18n="settings.theme">Theme Settings</h3>
                        <div class="theme-selector">
                            <button type="button" class="theme-btn" data-theme="light" data-i18n="settings.themeLight">Light</button>
                            <button type="button" class="theme-btn" data-theme="dark" data-i18n="settings.themeDark">Dark</button>
                        </div>
                    </div>
                    <div class="settings-section">
                        <h3 data-i18n="settings.language">Language</h3>
                        <div class="language-selector">
                            <button type="button" class="language-btn" data-language="en" title="English" data-i18n="settings.languageEn">🇺🇸 English</button>
                            <button type="button" class="language-btn" data-language="ur" title="Urdu" data-i18n="settings.languageUr">🇵🇰 اردو</button>
                        </div>
                    </div>
                    <button type="button" id="closeSettings" class="close-btn" data-i18n="settings.close">Close Settings</button>
                </form>
            </div>
        </div>
        <footer>
            <p></p>
        </footer>
    </div>
    <script type="module" src="js/home.js"></script>
</body>

</html>
