<!-- Moderator Management Section -->
<section id="moderator-section" class="content-section">
    <div class="section-header">
        <h2>Moderator Management</h2>
        <button id="addModeratorBtn" class="primary-btn" onclick="openAddModeratorModal()">
            Add New Moderator
        </button>
    </div>

    <div id="moderatorsList" class="moderators-list">
        <!-- Moderators will be loaded here dynamically -->
    </div>
</section>

<!-- Add Moderator Modal -->
<div id="addModeratorModal" class="modal hidden">
    <div class="modal-content">
        <h2>Add New Moderator</h2>
        <form id="addModeratorForm">
            <div class="form-group">
                <label for="moderatorEmail">Email Address:</label>
                <input type="email" id="moderatorEmail" required placeholder="Enter email address">
            </div>
            <div class="form-actions">
                <button type="button" onclick="closeAddModeratorModal()" class="secondary-btn">Cancel</button>
                <button type="submit" class="primary-btn">Add Moderator</button>
            </div>
        </form>
    </div>
</div>
