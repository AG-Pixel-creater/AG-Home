<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AG | Home</title>
    <script>
        /**
         * GitHub Pages 404 Handler
         * This script allows direct page access on GitHub Pages
         * by redirecting 404 errors to the appropriate page
         */
        
        // Get the page path from the URL
        const path = window.location.pathname.replace('/AG-Home/', '');
        
        // List of valid pages
        const validPages = [
            'index.html',
            'home.html',
            'about.html',
            'products.html',
            'contact.html',
            'privacy.html',
            'control.html'
        ];
        
        // Check if the requested page is valid
        const requestedPage = path.split('/').pop() || 'index.html';
        
        if (validPages.includes(requestedPage) && requestedPage !== '') {
            // Redirect to the requested page
            window.location.href = '/AG-Home/' + requestedPage;
        } else {
            // Default redirect to home
            window.location.href = '/AG-Home/index.html';
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
        }
        
        h1 {
            color: #333;
            margin: 0 0 1rem 0;
        }
        
        p {
            color: #666;
            line-height: 1.6;
        }
        
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem 0;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-code {
            font-size: 3rem;
            font-weight: bold;
            color: #667eea;
            margin: 0;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        
        .back-link:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="error-code">404</p>
        <h1>Page Not Found</h1>
        <p>We're redirecting you to the correct page...</p>
        <div class="spinner"></div>
        <p><small>If you're not redirected automatically, <a href="/AG-Home/index.html" class="back-link">click here</a></small></p>
    </div>
</body>
</html>
